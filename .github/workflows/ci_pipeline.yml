name: CI Pipeline MLflow & Docker

on:
  push:
    paths:
      - 'MLProject/**'
  workflow_dispatch:

jobs:
  retrain-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install pandas scikit-learn mlflow

      - name: Re-Training Model (MLflow Project)
        run: |
          cd MLProject
          mlflow run . --env-manager local

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image via MLflow & Push
        run: |
          cd MLProject
          # Membungkus artefak 'model_output' menjadi Docker Image
          mlflow models build-docker -m model_output -n ${{ secrets.DOCKER_USERNAME }}/sml_model_api:latest
          
          # Mengirim Image ke Docker Hub
          docker push ${{ secrets.DOCKER_USERNAME }}/sml_model_api:latest

      - name: Commit & Push Artifact ke GitHub Repo
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add MLProject/model_output/
          git commit -m "🤖 Auto-update: Artefak Model Terbaru" || echo "Tidak ada perubahan"
          git push